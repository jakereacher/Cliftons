<div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm">
        <form method="GET">
            <input type="hidden" name="period" value="custom">
            {% if dimension %}
            <input type="hidden" name="dimension" value="{{ dimension }}">
            {% endif %}
            <div class="px-6 pt-6 pb-4">
                <h3 class="text-lg font-bold text-slate-900 mb-4">Select Date Range</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Start Date</label>
                        <input type="date" name="start_date" required
                               class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">End Date</label>
                        <input type="date" name="end_date" required
                               class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                </div>
            </div>
            <div class="bg-slate-50 px-6 py-3 flex justify-end gap-3 rounded-b-2xl">
                <button type="button"
                        hx-get="/modal/close"
                        hx-target="#modal-container"
                        hx-swap="innerHTML"
                        class="px-4 py-2 text-sm font-semibold text-slate-700 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition">
                    Cancel
                </button>
                <button type="submit"
                        class="px-4 py-2 text-sm font-semibold text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition">
                    Apply Range
                </button>
            </div>
        </form>
    </div>
</div>
