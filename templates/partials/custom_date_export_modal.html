<div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm">
        <form method="GET" action="/leads/export">
            <input type="hidden" name="period" value="custom">
            <div class="px-6 pt-6 pb-4">
                <h3 class="text-lg font-bold text-slate-900 mb-1">Custom Export Range</h3>
                <p class="text-xs text-slate-500 mb-4">Only leads created within this date range will be exported.</p>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Start Date</label>
                        <input type="date" name="start_date" required
                               class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">End Date</label>
                        <input type="date" name="end_date" required
                               class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500">
                    </div>
                </div>
            </div>
            <div class="bg-slate-50 px-6 py-3 flex justify-end gap-3 rounded-b-2xl">
                <button type="button"
                        hx-get="/modal/close"
                        hx-target="#export-modal-container"
                        hx-swap="innerHTML"
                        class="px-4 py-2 text-sm font-semibold text-slate-700 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition">
                    Cancel
                </button>
                <button type="submit"
                        class="flex items-center gap-1.5 px-4 py-2 text-sm font-semibold text-white bg-purple-600 rounded-lg hover:bg-purple-700 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                    Export CSV
                </button>
            </div>
        </form>
    </div>
</div>
