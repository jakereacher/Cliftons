<!-- partials/delete_modal.html -->
<!-- This entire overlay is injected by HTMX into #modal-container on the view_lead page -->
<div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl p-6 sm:p-8 w-full max-w-sm shadow-2xl">

        <div class="flex items-center gap-3 mb-4">
            <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center shrink-0">
                <svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
            </div>
            <h3 class="text-xl font-bold text-slate-950">Delete Lead</h3>
        </div>

        <p class="text-slate-600 text-sm mb-1">
            You are about to permanently delete <strong class="text-slate-950">{{ lead.name }}</strong>.
        </p>
        <p class="text-slate-500 text-xs mb-6">This will remove all interactions, documents, and follow-ups. This action cannot be undone.</p>

        <form method="POST" action="/leads/delete/{{ lead.id }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <label class="block text-sm font-semibold text-slate-700 mb-1.5">
                Enter your password to confirm
            </label>
            <input type="password" name="password" required autofocus
                   class="w-full px-4 py-2.5 border border-slate-300 rounded-xl mb-5 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-red-400"
                   placeholder="Your password">
            <div class="flex flex-col-reverse sm:flex-row gap-3">
                <!-- Close button: replaces modal-container with empty string via HTMX -->
                <button type="button"
                        hx-get="/leads/{{ lead.id }}/modal-close"
                        hx-target="#modal-container"
                        hx-swap="innerHTML"
                        class="flex-1 bg-slate-100 text-slate-700 py-2.5 rounded-xl text-sm font-semibold hover:bg-slate-200 transition">
                    Cancel
                </button>
                <button type="submit"
                        class="flex-1 bg-red-600 text-white py-2.5 rounded-xl text-sm font-semibold hover:bg-red-700 transition">
                    Delete Lead
                </button>
            </div>
        </form>
    </div>
</div>
