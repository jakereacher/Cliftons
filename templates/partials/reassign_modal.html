<!-- partials/reassign_modal.html -->
<!-- This entire overlay is injected by HTMX into #modal-container on the view_lead page -->
<div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl p-6 sm:p-8 w-full max-w-sm shadow-2xl">

        <div class="flex items-center gap-3 mb-5">
            <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center shrink-0">
                <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
            </div>
            <div>
                <h3 class="text-xl font-bold text-slate-950">Reassign Lead</h3>
                <p class="text-xs text-slate-500 mt-0.5">{{ lead.name }}</p>
            </div>
        </div>

        <form method="POST" action="/leads/reassign/{{ lead.id }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <label class="block text-sm font-semibold text-slate-700 mb-1.5">
                Assign to
            </label>
            <select name="new_user_id" required
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-xl mb-6 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-purple-400">
                <option value="">Select counsellor…</option>
                {% for user in users %}
                <option value="{{ user.id }}">{{ user.name }} ({{ user.email }})</option>
                {% endfor %}
            </select>
            <div class="flex flex-col-reverse sm:flex-row gap-3">
                <!-- Close button: clears the modal container -->
                <button type="button"
                        hx-get="/leads/{{ lead.id }}/modal-close"
                        hx-target="#modal-container"
                        hx-swap="innerHTML"
                        class="flex-1 bg-slate-100 text-slate-700 py-2.5 rounded-xl text-sm font-semibold hover:bg-slate-200 transition">
                    Cancel
                </button>
                <button type="submit"
                        class="flex-1 bg-purple-600 text-white py-2.5 rounded-xl text-sm font-semibold hover:bg-purple-700 transition">
                    Reassign
                </button>
            </div>
        </form>
    </div>
</div>
