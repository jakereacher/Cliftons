{% extends "base.html" %}

{% block title %}Add User{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-100px)] flex items-center justify-center p-4">
    <div class="w-full max-w-2xl">
        <h1 class="text-2xl sm:text-3xl font-extrabold mb-6 sm:mb-8 text-center text-slate-950 tracking-tight">Add New User</h1>
        
        <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8 border border-slate-100">
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Name</label>
                    <input type="text" name="name" required class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-sm" placeholder="Full Name">
                </div>
                
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Email</label>
                    <input type="email" name="email" required class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-sm" placeholder="email@example.com">
                </div>
                
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
                    <input type="password" name="password" required class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-sm" placeholder="Enter secure password">
                </div>
                
                <div class="mb-8">
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Role</label>
                    <select name="role" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-sm bg-white">
                        <option value="user">User (Counsellor/Telecaller)</option>
                        <option value="super_admin">Super Admin</option>
                    </select>
                </div>
                
                <div class="flex flex-col sm:flex-row gap-4">
                    <button type="submit" class="flex-1 bg-slate-950 text-white py-3 rounded-lg font-semibold hover:bg-sky-600 transition text-sm sm:text-base">
                        Create User
                    </button>
                    <a href="{{ url_for('users_list') }}" class="flex-1 bg-gray-200 text-slate-800 py-3 rounded-lg font-semibold hover:bg-gray-300 transition text-center text-sm sm:text-base">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
