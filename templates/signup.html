{% extends "base.html" %}

{% block title %}Company Sign Up{% endblock %}

{% block content %}
<nav class="w-full bg-white border-b border-slate-100 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="flex items-center justify-center p-2 rounded-xl bg-sky-600">
                <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <span class="font-bold text-xl tracking-tighter text-slate-950">Cliftons<span class="text-sky-600">Leads</span></span>
        </div>
        <a href="{{ url_for('landing') }}" class="text-sm font-semibold text-slate-600 hover:text-sky-600">
            Back to Website
        </a>
    </div>
</nav>

<div class="min-h-[calc(100vh-73px)] flex items-center justify-center p-4 bg-slate-50">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 sm:p-8 border border-slate-100">
        <h2 class="text-2xl sm:text-3xl font-extrabold mb-2 text-center text-slate-950 tracking-tight">Register Your Company</h2>
        <p class="text-center text-slate-600 mb-8 text-sm sm:text-base">Get started with Cliftons Lead Management</p>
        
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="mb-5">
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Company Name</label>
                <input type="text" name="company_name" required class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-sm" placeholder="e.g. ABC Study Abroad Consultancy">
            </div>
            
            <div class="mb-5">
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Company Short Code</label>
                <input type="text" name="company_code" required class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-sm" placeholder="e.g. abc" pattern="[a-z0-9]+" title="Only lowercase letters and numbers">
                <p class="text-xs text-slate-500 mt-1.5">Unique identifier (lowercase, no spaces, e.g., 'abc')</p>
            </div>
            
            <div class="mb-5">
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Super Admin Name</label>
                <input type="text" name="super_admin_name" required class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-sm" placeholder="John Doe">
            </div>
            
            <div class="mb-5">
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Super Admin Email</label>
                <input type="email" name="super_admin_email" required class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-sm" placeholder="admin@company.com">
            </div>
            
            <div class="mb-6">
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Super Admin Password</label>
                <input type="password" name="super_admin_password" required class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-sm" placeholder="Enter secure password">
            </div>
            
            <button type="submit" class="w-full bg-slate-950 text-white py-3 rounded-lg font-semibold hover:bg-sky-600 transition text-sm sm:text-base">
                Register Company
            </button>
        </form>
        
        <div class="mt-8 text-center">
            <a href="{{ url_for('login') }}" class="text-sm text-slate-600 hover:text-sky-600 font-medium">
                Already have an account? Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
