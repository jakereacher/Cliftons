{% extends "base.html" %}

{% block title %}Edit Course{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-100px)] flex items-center justify-center p-4">
    <div class="w-full max-w-2xl">
        <h1 class="text-2xl sm:text-3xl font-extrabold mb-6 sm:mb-8 text-center text-slate-950 tracking-tight">Edit Course</h1>
        
        <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8 border border-slate-100">
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Course Name *</label>
                    <input type="text" name="course_name" value="{{ course.course_name }}" required class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-sm">
                </div>
                
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Course Fee (₹) *</label>
                    <input type="number" step="0.01" name="course_fee" value="{{ course.course_fee }}" required class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-sm">
                </div>
                
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Course Duration</label>
                    <input type="text" name="course_duration" value="{{ course.course_duration or '' }}" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-sm">
                </div>
                
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Course Details Link 1</label>
                    <input type="url" name="course_details_1_link" value="{{ course.course_details_1_link or '' }}" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-sm">
                </div>
                
                <div class="mb-8">
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Course Details Link 2</label>
                    <input type="url" name="course_details_2_link" value="{{ course.course_details_2_link or '' }}" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 text-sm">
                </div>
                
                <div class="flex flex-col sm:flex-row gap-4">
                    <button type="submit" class="flex-1 bg-slate-950 text-white py-3 rounded-lg font-semibold hover:bg-sky-600 transition text-sm sm:text-base">
                        Update Course
                    </button>
                    <a href="{{ url_for('courses_list') }}" class="flex-1 bg-gray-200 text-slate-800 py-3 rounded-lg font-semibold hover:bg-gray-300 transition text-center text-sm sm:text-base">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
